title = "Drew Kerby"

base_url = "https://drewkerby.dev"

theme = "apollo"

build_search_index = true
generate_feeds = true
compile_sass = true
minify_html = true
taxonomies = [{ name = "tags" }]

[search]
include_title = true
include_description = true
include_path = true
include_content = true
index_format = "elasticlunr_json"

[markdown.highlighting]
style = "class"
light_theme = "github-light"
dark_theme = "github-dark"
error_on_missing_language = true

[extra]
toc = true
use_cdn = false
favicon = "/icon/favicon.png"
theme = "toggle"              # light, dark, auto, toggle, toggle-auto
fancy_code = true
dynamic_note = true           # a note that can be toggled
mathjax = true

fediverse = false    # author attribution
fediverse_creator = ""    # e.g. @user@instance

menu = [
    { name = "/posts", url = "/posts", weight = 1 },
    { name = "/projects", url = "/projects", weight = 2 },
    { name = "/talks", url = "/talks", weight = 3 },
    { name = "/books", url = "/books", weight = 4 },
    { name = "/tags", url = "/tags", weight = 5 },
]

socials = [
    { name = "github", url = "https://github.com/dkerby/", icon = "github" },
    { name = "linkedin", url = "https://www.linkedin.com/in/dkerby0/", icon = "linkedin" },
]

stylesheets = [
    # "custom.css"    # at /static/custom.css
]
